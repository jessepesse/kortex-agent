name: kortex-agent

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    networks:
      - kortex-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5001
    networks:
      - kortex-network

networks:
  kortex-network:
    driver: bridge
