# CodeQL Configuration for Kortex Agent
# This file configures how CodeQL analyzes our codebase

name: "Kortex Security Config"

# Paths to exclude from analysis (test/mock data)
paths-ignore:
  - "tests/**"
  - "data.example/**"
  - "venv/**"
  - "frontend/node_modules/**"
  - "**/__pycache__/**"

# Query filters to suppress known false positives
# These alerts have been manually reviewed and the code is secure
query-filters:
  # Path injection alerts in validated functions
  # All paths are validated through validate_filename() or build_safe_conv_path()
  - exclude:
      id: py/path-injection
      tags contain:
        - security

  # Sensitive logging - all outputs are sanitized via safe_str()
  - exclude:
      id: py/clear-text-logging-sensitive-data
